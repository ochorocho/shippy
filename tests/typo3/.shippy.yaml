hosts:
  production:
    hostname: 127.0.0.1
    port: 2424
    remote_user: root
    deploy_path: /var/www/html
    rsync_src: ./
    ssh_key: /Users/jochen/Development/shippy/tests/ssh_keys/tinnie_key
    ssh_multiplexing: false
    keep_releases: 2
    lock_enabled: true
    exclude:
      - "**/*.rst"
      - "**/*.md"
    include:
      - "public/.htaccess"

    shared:
      - .env
      - var/log/
      - var/session/
      - public/fileadmin/
      - public/uploads/

