exclude:
  - "**/*.rst"
  - "**/*.md"
include:
  - "public/.htaccess"
shared:
  - .env
  - var/log/
  - var/session/
  - public/fileadmin/
  - public/uploads/
keep_releases: 2

# Database-only backup used by the v14 integration test. With credentials: auto,
# Shippy uses `typo3 configuration:show` (available in TYPO3 v14+) to read the
# authoritative database configuration.
backup:
  database:
    credentials: auto
    exclude_tables:
      - "cache_*"
      - "cf_*"

hosts:
  production:
    hostname: 127.0.0.1
    port: 2424
    remote_user: root
    deploy_path: /var/www/html
    ssh_key: ../ssh_keys/shippy_key
    ssh_multiplexing: false
    ssh_options:
      StrictHostKeyChecking: ${HOST_KEY_CHECKING|accept-new}

  staging:
    hostname: 127.0.0.1
    port: 2424
    remote_user: root
    deploy_path: /var/www/html
    ssh_key: ../ssh_keys/shippy_key

commands:
  - name: Install TYPO3
    run: |
      TYPO3_DB_DRIVER=mysqli \
      TYPO3_DB_USERNAME=db \
      TYPO3_DB_PORT=3308 \
      TYPO3_DB_HOST=typo3-shippy-mariadb \
      TYPO3_DB_DBNAME=db \
      TYPO3_DB_PASSWORD=db \
      TYPO3_SETUP_ADMIN_EMAIL=admin@example.com \
      TYPO3_SETUP_ADMIN_USERNAME=admin \
      TYPO3_SETUP_ADMIN_PASSWORD=Password.1234! \
      TYPO3_PROJECT_NAME="Automated Setup v14" \
      TYPO3_SERVER_TYPE="apache" \
      ./vendor/bin/typo3 setup --force -n

  - name: Run extension setup
    run: ./{{config.bin-dir|vendor/bin}}/typo3 extension:setup

  - name: Run upgrade wizards
    run: ./{{config.bin-dir|vendor/bin}}/typo3 upgrade:run

  - name: Flush caches
    run: ./{{config.bin-dir|vendor/bin}}/typo3 cache:flush
