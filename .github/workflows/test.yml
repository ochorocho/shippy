name: Test

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
    # Release chains off this workflow (Build -> Test -> Release), so Test must
    # also run on version tags or tagged releases never reach the Release job.
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  audit:
    name: "Security audit"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        uses: jdx/mise-action@v2

      - name: Run security audit (vet, race, govulncheck, gosec)
        run: make audit

  test-shippy:
    name: "Test on Linux amd64"
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so scripts/get-version.sh can resolve the
          # version via `git describe --tags` during `make build`.
          fetch-depth: 0

      - name: Setup tools
        uses: jdx/mise-action@v2

      - name: Build binary
        shell: bash
        env:
          GOOS: linux
          GOARCH: amd64
        run: make build

      - name: Install dependencies (TYPO3 v13 fixture)
        uses: php-actions/composer@v6
        with:
          args: "--ignore-platform-reqs --optimize-autoloader"
          working_dir: "tests/typo3"

      - name: Install dependencies (TYPO3 v14 fixture)
        uses: php-actions/composer@v6
        with:
          args: "--ignore-platform-reqs --optimize-autoloader"
          working_dir: "tests/typo3-v14"

      - name: Make binary executable
        shell: bash
        run: chmod +x dist/shippy

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Setup Bats and Bats libs
        id: setup-bats
        run: |
          sudo apt-get update && sudo apt-get install -y bats bats-assert bats-support bats-file

      - name: Run quick tests (Serial Execution)
        shell: bash
        run: make test

      - name: Run integration tests (Serial Execution)
        shell: bash
        run: make test-integration
