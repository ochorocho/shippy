name: Build

on:
  push:
    branches:
      - "main"
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    name: "Build go ${{ matrix.go-version }} for ${{ matrix.os }}/${{ matrix.arch }}"
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.24"
        os:
          - darwin
          - linux
        arch:
          - amd64
          - arm64

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Get version information
        id: version
        shell: bash
        run: |
          chmod +x scripts/get-version.sh
          VERSION=$(./scripts/get-version.sh)
          COMMIT=$(git rev-parse HEAD)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build \
            -ldflags "-X 'tinnie/cmd.Version=${{ steps.version.outputs.version }}' \
                      -X 'tinnie/cmd.GitCommit=${{ steps.version.outputs.commit }}' \
                      -X 'tinnie/cmd.BuildDate=${{ steps.version.outputs.build_date }}'" \
            -o dist/tinnie

      - name: Generate checksums
        uses: Solratic/checksum-action@v1
        with:
          pattern: "dist/tinnie"
          suffix: "checksum"

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: tinnie-${{ matrix.os }}-${{ matrix.arch }}
          path: "dist/tinnie"

      - name: Upload a SHA Artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: tinnie-${{ matrix.os }}-${{ matrix.arch }}.sha
          path: "dist/sha256sum.txt"
