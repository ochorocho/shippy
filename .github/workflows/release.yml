name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  docker:
    name: "Build and push Docker image"
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Find Build workflow run
        id: build-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/build.yml/runs?head_sha=${{ github.event.workflow_run.head_sha }}&status=success" --jq '.workflow_runs[0].id')
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: shippy-linux-amd64
          path: dist/amd64
          run-id: ${{ steps.build-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: shippy-linux-arm64
          path: dist/arm64
          run-id: ${{ steps.build-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare binaries
        run: |
          mv dist/amd64/shippy dist/shippy-linux-amd64
          mv dist/arm64/shippy dist/shippy-linux-arm64
          rm -rf dist/amd64 dist/arm64
          chmod +x dist/shippy-linux-*

      - name: Build test image
        run: docker build --platform linux/amd64 -t shippy-test .

      - name: Run BATS tests in container
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -v "${{ github.workspace }}/tests:/workspace/tests:ro" \
            --entrypoint bash \
            shippy-test -c '
          set -euo pipefail
          apt-get update && apt-get install -y bats bats-assert bats-support bats-file
          mkdir -p /workspace/dist
          ln -s /usr/local/bin/shippy /workspace/dist/shippy
          cd /workspace
          bats --filter-tags "!integration" tests/*.bats
          '

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shippy
          tags: |
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
