name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  docker:
    name: "Build and push Docker image"
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Detect tag at HEAD
        id: tag
        run: |
          TAG=$(git tag --points-at HEAD --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "$TAG" ]; then
            echo "Detected tag: $TAG"
          else
            echo "No matching v*.*.* tag at HEAD — only branch-ref image tag will be pushed"
          fi

      - name: Find Build workflow run
        id: build-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/build.yml/runs?head_sha=${{ github.event.workflow_run.head_sha }}&status=success" --jq '.workflow_runs[0].id')
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download Linux amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: shippy-linux-amd64
          path: dist/amd64
          run-id: ${{ steps.build-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: shippy-linux-arm64
          path: dist/arm64
          run-id: ${{ steps.build-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare binaries
        run: |
          mv dist/amd64/shippy dist/shippy-linux-amd64
          mv dist/arm64/shippy dist/shippy-linux-arm64
          rm -rf dist/amd64 dist/arm64
          chmod +x dist/shippy-linux-*

      - name: Build test image
        run: docker build --platform linux/amd64 -t shippy-test .

      - name: Run BATS tests in container
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -v "${{ github.workspace }}/tests:/workspace/tests:ro" \
            --entrypoint bash \
            shippy-test -c '
          set -euo pipefail
          apt-get update && apt-get install -y bats bats-assert bats-support bats-file
          mkdir -p /workspace/dist
          ln -s /usr/local/bin/shippy /workspace/dist/shippy
          cd /workspace
          bats --filter-tags "!integration" tests/*.bats
          '

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shippy
          tags: |
            type=raw,value=latest,enable=${{ steps.tag.outputs.tag != '' }}
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.tag }},enable=${{ steps.tag.outputs.tag != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag }},enable=${{ steps.tag.outputs.tag != '' }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.tag }},enable=${{ steps.tag.outputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-assets:
    name: "Attach binaries to GitHub Release"
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Detect tag at HEAD
        id: tag
        run: |
          TAG=$(git tag --points-at HEAD --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "$TAG" ]; then
            echo "Detected tag: $TAG"
          else
            echo "No matching v*.*.* tag at HEAD — skipping release-asset upload"
          fi

      - name: Find Build workflow run
        id: build-run
        if: steps.tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh api "/repos/${{ github.repository }}/actions/workflows/build.yml/runs?head_sha=${{ github.event.workflow_run.head_sha }}&status=success" --jq '.workflow_runs[0].id')
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        if: steps.tag.outputs.tag != ''
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          run-id: ${{ steps.build-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: "shippy-*"

      - name: Stage release files
        if: steps.tag.outputs.tag != ''
        run: |
          mkdir -p dist
          for os in darwin linux; do
            for arch in amd64 arm64; do
              cp "artifacts/shippy-${os}-${arch}/shippy" "dist/shippy-${os}-${arch}"
              cp "artifacts/shippy-${os}-${arch}-checksum/shippy.checksum" "dist/shippy-${os}-${arch}.checksum"
            done
          done
          chmod +x dist/shippy-darwin-amd64 dist/shippy-darwin-arm64 dist/shippy-linux-amd64 dist/shippy-linux-arm64
          ls -lh dist/

      - name: Create or update GitHub Release
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/shippy-darwin-amd64
            dist/shippy-darwin-arm64
            dist/shippy-linux-amd64
            dist/shippy-linux-arm64
            dist/shippy-darwin-amd64.checksum
            dist/shippy-darwin-arm64.checksum
            dist/shippy-linux-amd64.checksum
            dist/shippy-linux-arm64.checksum
