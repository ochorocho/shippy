<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Concept 3: Circular Badge / Emblem -->
  
  <!-- Outer circle -->
  <circle cx="100" cy="95" r="82" fill="none" stroke="#1A2332" stroke-width="4"/>
  <circle cx="100" cy="95" r="74" fill="#1A2332"/>
  
  <!-- Water inside circle -->
  <path d="M30 115 Q50 105 70 115 Q90 125 110 115 Q130 105 150 115 Q165 122 172 118" 
        fill="none" stroke="#3498DB" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M35 125 Q55 118 75 128 Q95 138 115 128 Q135 118 155 128 Q168 134 170 132" 
        fill="none" stroke="#2980B9" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Hull -->
  <path d="M58 112 L142 112 L132 128 L65 128 Z" fill="#ECEFF1"/>
  
  <!-- Mast -->
  <line x1="100" y1="112" x2="100" y2="32" stroke="#ECEFF1" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- TYPO3 sail -->
  <path d="M103 35 L103 108 L148 108 Z" fill="#FF8700"/>
  
  <!-- Small front sail -->
  <path d="M97 42 L97 95 L72 95 Z" fill="#FF8700" opacity="0.8"/>
  
  <!-- Stars/dots decoration -->
  <circle cx="45" cy="50" r="2" fill="#ECEFF1" opacity="0.5"/>
  <circle cx="155" cy="55" r="1.5" fill="#ECEFF1" opacity="0.4"/>
  <circle cx="55" cy="70" r="1.5" fill="#ECEFF1" opacity="0.3"/>
</svg>
